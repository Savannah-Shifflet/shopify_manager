name = "sourcedesk"
client_id = "{{ SHOPIFY_CLIENT_ID }}"
application_url = "https://{{ SHOPIFY_STORE_DOMAIN }}"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,read_inventory,write_inventory,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_files,write_files,read_price_rules,write_price_rules"

[auth]
redirect_urls = [
  "https://{{ SHOPIFY_STORE_DOMAIN }}/auth/callback",
  "https://{{ SHOPIFY_STORE_DOMAIN }}/auth/shopify/callback",
  "https://{{ SHOPIFY_STORE_DOMAIN }}/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks"

[pos]
embedded = false
